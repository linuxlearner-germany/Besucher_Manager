name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-test-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Fix esbuild permissions
        run: |
          find ./node_modules/.bin -type f -exec chmod +x {} \; || true
          chmod +x ./node_modules/@esbuild/linux-x64/bin/esbuild || true
          chmod +x ./node_modules/.bin/esbuild || true
          chmod +x ./node_modules/vite/bin/vite.js || true

      - name: Backend tests
        run: npm run test:backend

      - name: Build
        run: npm run build

      - name: Docker E2E
        run: bash scripts/ci/run_docker_e2e.sh

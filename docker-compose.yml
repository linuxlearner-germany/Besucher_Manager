services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      SA_PASSWORD: ${MSSQL_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q 'SQL Server is now ready for client connections' /var/opt/mssql/log/errorlog"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  app:
    build: .
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
    env_file:
      - .env
    environment:
      UPLOAD_DIR: /app/uploads
    ports:
      - "${PORT:-3030}:3030"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "http=require('http');http.get('http://127.0.0.1:' + (process.env.PORT || process.env.APP_PORT || 3030) + '/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  sqlserver_data:

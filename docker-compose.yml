services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["local-db"]
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Express
      SA_PASSWORD: ${MSSQL_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "grep -q 'SQL Server is now ready for client connections' /var/opt/mssql/log/errorlog"
        ]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s

  db-bootstrap:
    image: mcr.microsoft.com/mssql/server:2022-latest
    profiles: ["local-db"]
    restart: "no"
    depends_on:
      sqlserver:
        condition: service_healthy
    env_file:
      - .env
    entrypoint:
      - /bin/bash
      - -lc
      - |
        set -euo pipefail
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_PASSWORD}" -C -Q "IF DB_ID(N'$${MSSQL_DATABASE}') IS NULL CREATE DATABASE [$${MSSQL_DATABASE}]; IF NOT EXISTS (SELECT 1 FROM sys.server_principals WHERE name = N'$${MSSQL_USER}') CREATE LOGIN [$${MSSQL_USER}] WITH PASSWORD = N'$${MSSQL_PASSWORD}', CHECK_POLICY = OFF;"
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$${MSSQL_PASSWORD}" -d "$${MSSQL_DATABASE}" -C -Q "IF NOT EXISTS (SELECT 1 FROM sys.database_principals WHERE name = N'$${MSSQL_USER}') CREATE USER [$${MSSQL_USER}] FOR LOGIN [$${MSSQL_USER}]; IF IS_ROLEMEMBER('db_owner', '$${MSSQL_USER}') <> 1 ALTER ROLE db_owner ADD MEMBER [$${MSSQL_USER}];"

  app:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-}
    restart: unless-stopped
    depends_on:
      sqlserver:
        condition: service_healthy
        required: false
      db-bootstrap:
        condition: service_completed_successfully
        required: false
    env_file:
      - .env
    environment:
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3030}
      APP_SECURE_COOKIES: ${APP_SECURE_COOKIES:-}
      APP_TRUST_PROXY: ${APP_TRUST_PROXY:-}
      UPLOAD_DIR: /app/uploads
      MAIL_RELAY_CONFIG_PATH: ${MAIL_RELAY_CONFIG_PATH:-/app/config/mail-relay.yml}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      no_proxy: ${no_proxy:-}
    ports:
      - "${PORT:-3030}:3030"
    volumes:
      - uploads_data:/app/uploads
      - ./config:/app/config:ro
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "http=require('http');http.get('http://127.0.0.1:' + (process.env.PORT || process.env.APP_PORT || 3030) + '/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
  sqlserver_data:

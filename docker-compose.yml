services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-3020}:${APP_PORT:-3020}"
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "http=require('http');http.get('http://127.0.0.1:' + (process.env.APP_PORT || 3020) + '/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  uploads_data:
